services:
  - type: web
    name: brainiac-linkedin-helper
    env: python
    region: oregon
    plan: free
    buildCommand: sudo apt-get install -y libreoffice && pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
